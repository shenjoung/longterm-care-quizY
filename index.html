<!doctype html>
<html lang="zh-Hant">
<head>

  <title>長照題庫練習</title>
  <style>
    :root {
      color-scheme: light;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --ink: #17312f;
      --muted: #607371;
      --line: #d7e3e1;
      --paper: #ffffff;
      --canvas: #f3f7f6;
      --primary: #147d72;
      --primary-dark: #0e625a;
      --primary-soft: #e5f3f1;
      --accent: #e36d4f;
      --accent-soft: #fff0eb;
      --correct: #18794e;
      --correct-soft: #e7f6ee;
      --danger: #b33a35;
      --danger-soft: #fff0ef;
      --shadow: 0 8px 24px rgba(21, 55, 51, .08);
    }
    * { box-sizing: border-box; }
    html { background: var(--canvas); }
    body { margin: 0; min-height: 100vh; color: var(--ink); background: var(--canvas); }
    button, input, select { font: inherit; }
    button { cursor: pointer; }
    button:focus-visible, input:focus-visible, select:focus-visible { outline: 3px solid rgba(20,125,114,.24); outline-offset: 2px; }
    .app { width: min(100%, 760px); min-height: 100vh; margin: 0 auto; background: var(--paper); box-shadow: var(--shadow); }
    header { position: sticky; top: 0; z-index: 5; display: flex; align-items: center; justify-content: space-between; min-height: 64px; padding: 10px 18px; border-bottom: 1px solid var(--line); background: rgba(255,255,255,.96); }
    .brand { border: 0; padding: 4px 0; color: var(--ink); background: transparent; font-size: 18px; font-weight: 800; }
    .header-action { border: 1px solid var(--line); border-radius: 6px; padding: 8px 11px; color: var(--primary-dark); background: white; font-weight: 700; }
    main { padding: 22px 18px calc(40px + env(safe-area-inset-bottom)); }
    h1, h2, h3, p { margin-top: 0; }
    h1 { margin-bottom: 8px; font-size: 28px; line-height: 1.25; letter-spacing: 0; }
    h2 { font-size: 22px; letter-spacing: 0; }
    .subtitle { color: var(--muted); line-height: 1.6; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 22px 0; }
    .stat { min-width: 0; padding: 14px 10px; border: 1px solid var(--line); border-radius: 8px; background: #fbfdfc; text-align: center; }
    .stat strong { display: block; font-size: 24px; color: var(--primary-dark); }
    .stat span { display: block; margin-top: 3px; color: var(--muted); font-size: 13px; }
    .section-title { margin: 28px 0 12px; font-size: 15px; color: var(--muted); font-weight: 800; }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .action-card { min-height: 112px; border: 1px solid var(--line); border-radius: 8px; padding: 16px; background: white; color: var(--ink); text-align: left; }
    .action-card.primary { border-color: var(--primary); background: var(--primary); color: white; }
    .action-card.review { border-color: #f0b5a6; background: var(--accent-soft); }
    .action-card:disabled { cursor: not-allowed; opacity: .5; }
    .action-card strong { display: block; margin-bottom: 7px; font-size: 17px; }
    .action-card span { display: block; font-size: 13px; line-height: 1.45; opacity: .82; }
    .settings-row { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 12px; margin-top: 12px; padding: 14px 0; border-top: 1px solid var(--line); }

    .quiet-button { border: 1px solid var(--line); background: white; color: var(--ink); }
    .danger-button { border: 1px solid #e3a6a2; background: var(--danger-soft); color: var(--danger); }
    .progress-track { height: 6px; margin: 5px 0 20px; border-radius: 999px; background: #dfe9e7; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--primary); transition: width .2s ease; }
    .quiz-meta { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 9px; color: var(--muted); font-size: 14px; font-weight: 700; }
    .question-box { padding: 20px 0 14px; }
    .question-number { margin-bottom: 10px; color: var(--primary-dark); font-size: 14px; font-weight: 800; }
    .question-text { margin-bottom: 20px; font-size: 21px; line-height: 1.55; font-weight: 750; }
    .options { display: grid; gap: 10px; }
    .option { display: grid; grid-template-columns: 34px 1fr; gap: 10px; align-items: start; width: 100%; min-height: 56px; border: 1px solid #b9cac7; border-radius: 8px; padding: 12px; background: white; color: var(--ink); text-align: left; line-height: 1.5; }
    .option:hover { border-color: var(--primary); background: #f8fcfb; }
    .option:disabled { cursor: default; opacity: 1; }
    .option.correct { border-color: var(--correct); background: var(--correct-soft); color: #115c3b; }
    .option.wrong { border-color: var(--danger); background: var(--danger-soft); color: #8c2d29; }
    .option-key { display: grid; width: 30px; height: 30px; place-items: center; border-radius: 50%; background: var(--primary-soft); color: var(--primary-dark); font-weight: 900; }
    .option.correct .option-key { background: var(--correct); color: white; }
    .option.wrong .option-key { background: var(--danger); color: white; }
    .feedback { margin-top: 16px; border-left: 4px solid var(--correct); padding: 13px 14px; background: var(--correct-soft); line-height: 1.5; }
    .feedback.wrong { border-color: var(--danger); background: var(--danger-soft); }
    .feedback strong { display: block; margin-bottom: 4px; }
    .next-button { width: 100%; margin-top: 16px; padding: 14px; }
    .result-score { margin: 20px 0 4px; font-size: 52px; color: var(--primary-dark); font-weight: 900; }
    .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 22px 0; }
    .result-grid .stat { padding: 16px; }
    .toolbar { display: grid; grid-template-columns: 1fr auto; gap: 8px; margin-bottom: 14px; }
    .question-list { display: grid; gap: 8px; }
    .list-item { border: 1px solid var(--line); border-radius: 8px; padding: 14px; background: white; }
    .list-item summary { cursor: pointer; list-style: none; font-weight: 750; line-height: 1.45; }
    .list-item summary::-webkit-details-marker { display: none; }
    .list-meta { display: flex; gap: 8px; margin-bottom: 7px; color: var(--muted); font-size: 12px; }
    .answer-detail { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line); color: var(--correct); line-height: 1.5; }
    .empty { padding: 36px 18px; border: 1px dashed #b8c9c6; border-radius: 8px; color: var(--muted); text-align: center; }
    .backup-actions { display: grid; gap: 10px; }
    .backup-actions button { width: 100%; }
    .note { padding: 13px 14px; border: 1px solid var(--line); border-radius: 8px; background: #f8fbfa; color: var(--muted); font-size: 14px; line-height: 1.55; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
    @media (max-width: 520px) {
      .app { box-shadow: none; }
      main { padding-inline: 15px; }
      h1 { font-size: 25px; }
      .question-text { font-size: 19px; }
      .actions { grid-template-columns: 1fr; }
      .action-card { min-height: 92px; }
      .stats { gap: 6px; }
      .stat { padding-inline: 6px; }
      .stat strong { font-size: 21px; }
    }

定要先做的事為下列何者？","options":["反抽看看確認管子在胃中及胃中食物之消化情形","轉動一下鼻胃管，重新固定，以免滑脫","先清洗鼻胃","先灌開水，再灌食"]},{"id":70,"answer":3,"question":"灌食速度太快時，被照顧者容易出現什麼狀況？","options":["嗆到","咳嗽","心跳加速","脈搏減慢"]},{"id":71,"answer":1,"question":"如果灌食時有嘔吐情形，下列處理措施何者為宜？","options":["立即停止灌食，並觀察其呼吸、心跳","沒關係","立即打119求救","改變案主姿勢"]},{"id":72,"answer":1,"question":"將案主由床鋪扶到輪椅上，下列哪一項是最優先要做的？","options":["先將輪椅固定好","在案主身上找到固定的施力點","先試試看能不能搬得動","先找來另一個人以備協助"]},{"id":73,"answer":3,"question":"如果在照顧者移位的過程中出現意外事故時，下列何者為最優先的措施？","options":["就近尋求協助","趕快清理現場，當作沒發生","維護被照顧者的安全","打電話通知家屬"]},{"id":74,"answer":4,"question":"如果您要單獨一個人協助案主由椅子上移位到床鋪時，哪一項為不適當措施？","options":["先排除床與椅子間的障礙物","事先向案主說明步驟","移位時要逐步再叮嚀","事先告知案主要小心，萬一發生意外要自行負責"]},{"id":75,"answer":1,"question":"為案主烹調膳食時，需要注意六大類食物之均衡，其中以供應蛋白質為主的是","options":["魚、肉、豆、蛋、奶類","蔬菜、水果類","五穀、根莖類","油脂類"]},{"id":76,"answer":2,"question":"所照顧的案主罹患高血壓，在調製飲食必須注意之事項為","options":["多喝牛奶、吃小魚乾","低動物性油、低鹽的飲食","多吃動物性蛋白質的食物","植物性奶油因為是植物性的，多吃沒關係"]},{"id":77,"answer":4,"question":"在案家工作時，照顧服務員的工作範圍包括A.案主本身 B.案主個人所使用的範圍 C.案主所居住的空間 D.案主鄰居 E.案主親戚，下列何者組合正確？","options":["ABE","BCD","ABD","ABC"]},{"id":78,"answer":4,"question":"致病原可由多種方式傳播，下列有關傳播途徑之敘述，何者正確？","options":["接觸傳染又可分為直接接觸、間接接觸以及空氣傳染","AIDS是屬於病媒傳染","痢疾是屬於飛沫傳染","食物和水的傳染是指人類食用已被污染的食物及水等，而造成疾病"]},{"id":79,"answer":4,"question":"關於照顧服務員在飲食服務的職責上，下列敘述何者不正確？","options":["應具有營養與食物分類的基本知識","協助案主盡量食用改善疾病的治療飲食","觀察案主的進食情況並記錄食入量及剩餘量","對於案主要求的食物應盡量滿足"]},{"id":80,"answer":3,"question":"下列何者不正確？","options":["使用肛門塞劑協助案主塞入肛門時，宜鼓勵案主深呼吸放鬆肛門","服用油性藥品後，可給予果汁或餅乾，以去除味道","服用咳嗽藥水後，可給予開水以減少藥味","傷口塗抹藥物時，應由傷口中心向四周環形塗抹"]},{"id":81,"answer":1,"question":"下列何者不屬於助行器的種類？","options":["護腰","柺杖","四腳助行器","四腳拐杖"]},{"id":82,"answer":2,"question":"協助長期臥床的案主下床活動，下列何者正確？","options":["案主想下床就下床","先在床緣坐穩並觀察案主生命徵象穩定，才下床","為趕時間迅速下床","配合生活安排，即刻下床"]},{"id":83,"answer":2,"question":"嚴重急性呼吸道症候群（SARS）的流行期間，下列敘述那一項是錯誤？","options":["進出醫院的人都需要測體溫","案主因住家中不必特別監控體溫的變化","與發燒者接觸的人要特別監控體溫","照顧服務員因接觸各種不同的人，更要監控體溫"]},{"id":84,"answer":1,"question":"為案主修剪趾甲，下列哪一項動作是正確的？","options":["先行以溫水泡腳，軟化趾甲後再行修剪","為減少修剪次數，一次就把趾甲剪得很短","擔心案主受傷而不要修剪較好","選擇尖頭剪刀較易修剪"]},{"id":85,"answer":1,"question":"對於清醒的案主灌食前一定要做的事，下列何項是正確的？","options":["反抽胃管胃液，以確認胃管在胃中及胃中食物消化的情形","把胃管抽出5公分看看有無在胃中，並消毒後再灌食","先灌100cc開水看管子是否在胃中","胃管用清水多清洗幾次再灌食"]},{"id":86,"answer":2,"question":"當案主需使用熱水袋時，下列何者錯誤？","options":["密切觀察案主的反應情形","不管使用時間，等涼了再裝熱水繼續使用","熱水袋的水溫約40～46℃","不可使用在腹痛（確定經痛者除外）"]},{"id":87,"answer":1,"question":"協助有留置尿管的案主移位時，下列措施哪一項是正確的？","options":["尿袋不可高於膀胱","只要方便移位就好了","先移位，尿袋自然會拖過去","尿已滿袋，但不用擔心，移好位子再倒尿"]},{"id":88,"answer":4,"question":"正確的洗手法，下列哪一項是錯誤的？","options":["將衣袖捲至手肘以上並取下飾物及手錶","遵守濕、搓、沖、捧、擦的洗手原則","將手掌面、手背、指尖與指縫的每一表面至少搓洗5次以上","洗完手以手捧水沖水龍頭流水口"]},{"id":89,"answer":2,"question":"以輪椅推送案主，為保護案主的安全，下列哪一項是錯誤？","options":["在斜坡路下坡時，要調整輪椅之走向，以椅背先行的原則","在斜坡路下坡時，要調整輪椅之走向，以坐椅口前行的原則","隨時注意案主的生命徵象","隨時注意路面狀況"]},{"id":90,"answer":3,"question":"協助服用口服藥物時應注意a.潮濕或變色不可用 b.只要沒拆封過的都可服用 c.服用時間與方法 d.服用的劑量","options":["abc","bcd","acd","abd"]},{"id":91,"answer":3,"question":"為何協助吞嚥困難個案進行口腔清潔很重要？","options":["吞嚥困難個案通常不刷牙","吞嚥困難個案通常有麻痺現象，無法使用雙手","口腔內的細菌會增加吸入性肺炎的危險","這些個案通常沒有牙齒，故不需做口腔護理"]},{"id":92,"answer":4,"question":"下列何藥品需經由醫師開立處方才能拿藥？","options":["成藥","指示藥","草藥","處方藥"]},{"id":93,"answer":1,"question":"口服藥物正確服用方式為？A.以適量開水配服，勿配茶、咖啡、果汁、牛奶 B.將制酸錠咬碎的藥效較好 C.發泡錠應加適量水溶解後再服用 D.腸衣錠應咬碎、磨粉後再服用","options":["ABC","BCD","ABD","ACD"]},{"id":94,"answer":2,"question":"正確的藥袋標示內容，不含以下何者？","options":["病人姓名、性別","疾病診斷資料","調劑者姓名、地點","藥名及含量"]},{"id":95,"answer":3,"question":"與智能不足者相處時，下列服務方式何者為正確？","options":["多同情他，凡事都幫他做好","嚴厲要求他學習自我照顧","多示範少指揮，多給練習的機會","任其自由發展"]},{"id":96,"answer":4,"question":"對待失智長者，下列何者最適當？","options":["可約定出門時間，請長者預先準備","所有失智長者均統一照顧方式","以對待小孩的態度對待失智長者，表達親切","盡量鼓勵長者盡其所能，發揮長處"]},{"id":97,"answer":3,"question":"失智的陳先生經常被發現在客廳便溺，下列措施何者為宜？A.協助改為穿尿布 B.協助長者換上有拉鍊的褲子 C.在廁所門口貼上「馬桶」的圖片 D.掌握排泄習慣引導並去廁所","options":["AB","BC","CD","AC"]},{"id":98,"answer":2,"question":"為案主提供餐飲服務下列事項何者為不正確？","options":["價錢合理","以重口味為主","注意營養均衡且以清淡為原則","符合案主喜好"]},{"id":99,"answer":3,"question":"當為案主整理家務時，基於個人衛生安全，需要自行準備的是：A.可替換的衣物 B.掃帚 C.     const STORAGE_KEY = 'care-quiz-progress-v1';
    const circled = ['①', '②', '③', '④'];
    const main = document.getElementById('appMain');
    const homeButton = document.getElementById('homeButton');
    const headerAction = document.getElementById('headerAction');
    const importFile = document.getElementById('importFile');
    let view = 'home';
    let session = null;

    function defaultStore() { return { version: 1, records: {}, updatedAt: Date.now() }; }
    function loadStore() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return parsed && parsed.version === 1 && parsed.records ? parsed : defaultStore();
      } catch (_) { return defaultStore(); }
    }
    let store = loadStore();
    function saveStore() { store.updatedAt = Date.now(); localStorage.setItem(STORAGE_KEY, JSON.stringify(store)); }
    function recordFor(id) { return store.records[id] || { attempts: 0, correct: 0, wrong: 0, streak: 0, level: 0, nextReview: 0, lastAnswered: 0 }; }
    function escapeHtml(value) { return String(value).replace(/[&<>"']/g, function (char) { return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[char]; }); }
    function shuffle(items) {
      const result = items.slice();
      for (let index = result.length - 1; index > 0; index -= 1) {
        const swap = Math.floor(Math.random() * (index + 1));
        [result[index], result[swap]] = [result[swap], result[index]];
      }
      return result;
    }
    function stats() {
      const records = Object.values(store.records);
      const now = Date.now();
      return {
        practiced: records.filter(function (r) { return r.attempts > 0; }).length,
        wrong: records.filter(function (r) { return r.wrong > 0 && r.streak < 2; }).length,
        due: records.filter(function (r) { return r.attempts > 0 && r.nextReview <= now && r.level < 4; }).length,
        mastered: records.filter(function (r) { return r.level >= 4; }).length
      };
    }
    function setHeader(action) {
      headerAction.textContent = action === 'home' ? '返回首頁' : action === 'backup' ? '進度管理' : '題庫總覽';
      headerAction.dataset.action = action;
    }
    function renderHome() {
      view = 'home';
      setHeader('browse');
      const s = stats();
      main.innerHTML = '<h1>今天要練哪一組？</h1>' +
        '<p class="subtitle">共 202 題。答錯的題目會在稍後再次出現，並自動排入複習。</p>' +
        '<div class="stats"><div class="stat"><strong>' + s.practiced + '</strong><span>已練題目</span></div><div class="stat"><strong>' + s.wrong + '</strong><span>待加強</span></div><div class="stat"><strong>' + s.mastered + '</strong><span>已熟練</span></div></div>' +
        '<div class="actions">' +
          '<button class="action-card primary" data-start="quick"><strong>快速測驗</strong><span>隨機抽題，作答後立即看答案</span></button>' +
          '<button class="action-card review" data-start="wrong" ' + (s.wrong ? '' : 'disabled') + '><strong>錯題複習</strong><span>' + (s.wrong ? s.wrong + ' 題需要加強' : '目前沒有錯題') + '</span></button>' +
          '<button class="action-card" data-start="due" ' + (s.due ? '' : 'disabled') + '><strong>今日複習</strong><span>' + (s.due ? s.due + ' 題到期' : '今天沒有到期題目') + '</span></button>' +
          '<button class="action-card" data-start="all"><strong>順序練習</strong><span>從第 1 題開始依序作答</span></button>' +
        '</div>' +
        '<div class="section-title">測驗設定</div>' +
        '<div class="settings-row"><label for="quizSize">快速測驗題數</label><select id="quizSize"><option value="10">10 題</option><option value="20" selected>20 題</option><option value="50">50 題</option><option value="202">全部 202 題</option></select></div>' +
        '<div class="settings-row"><div><strong>學習進度</strong><div class="subtitle" style="font-size:13px;margin-top:3px">備份、還原或清除這台裝置的紀錄</div></div><button class="quiet-button" data-view="backup">管理</button></div>';
      main.querySelectorAll('[data-start]').forEach(function (button) { button.addEventListener('click', function () { startSession(button.dataset.start); }); });
      main.querySelector('[data-view="backup"]').addEventListener('click', renderBackup);
    }
    function startSession(mode) {
      const s = stats();
      let pool = QUESTIONS.slice();
      let title = '快速測驗';
      if (mode === 'wrong') {
        pool = QUESTIONS.filter(function (q) { const r = recordFor(q.id); return r.wrong > 0 && r.streak < 2; });
        title = '錯題複習';
      } else if (mode === 'due') {
        pool = QUESTIONS.filter(function (q) { const r = recordFor(q.id); return r.attempts > 0 && r.nextReview <= Date.now() && r.level < 4; });
        title = '今日複習';
      } else if (mode === 'all') {
        title = '順序練習';
      } else {
        const size = Number(document.getElementById('quizSize')?.value || 20);
        pool = shuffle(pool).slice(0, size);
      }
      if (!pool.length) { renderHome(); return; }
      if (mode !== 'all') pool = shuffle(pool);
      session = { mode, title, queue: pool.map(function (q) { return q.id; }), index: 0, answered: false, selected: null, correct: 0, wrong: 0, initialCount: pool.length, repeats: {} };
      renderQuiz();
    }
    function currentQuestion() { return QUESTIONS.find(function (q) { return q.id === session.queue[session.index]; }); }
    function renderQuiz() {
      view = 'quiz';
      setHeader('home');
      const q = currentQuestion();
      const progress = Math.min(100, (session.index / session.queue.length) * 100);
      main.innerHTML = '<div class="quiz-meta"><span>' + escapeHtml(session.title) + '</span><span>' + (session.index + 1) + ' / ' + session.queue.length + '</span></div>' +
        '<div class="progress-track"><div class="progress-bar" style="width:' + progress + '%"></div></div>' +
        '<section class="question-box"><div class="question-number">題目 ' + q.id + '</div><div class="question-text">' + escapeHtml(q.question) + '</div><div class="options">' +
        q.options.map(function (option, index) { return '<button class="option" type="button" data-answer="' + (index + 1) + '"><span class="option-key">' + circled[index] + '</span><span>' + escapeHtml(option) + '</span></button>'; }).join('') +
        '</div><div id="feedbackArea"></div></section>';
      main.querySelectorAll('.option').forEach(function (button) { button.addEventListener('click', function () { answerQuestion(Number(button.dataset.answer)); }); });
    }
    function answerQuestion(selected) {
      if (session.answered) return;
      session.answered = true;
      session.selected = selected;
      const q = currentQuestion();
      const correct = selected === q.answer;
      const previous = recordFor(q.id);
      const now = Date.now();
      const record = { ...previous, attempts: previous.attempts + 1, lastAnswered: now };
      if (correct) {
        record.correct += 1;
        record.streak += 1;
        record.level = Math.min(4, Math.max(1, previous.level + 1));
        const days = [0, 1, 3, 7, 14][record.level];
        record.nextReview = now + days * 86400000;
        session.correct += 1;
      } else {
        record.wrong += 1;
        record.streak = 0;
        record.level = 0;
        record.nextReview = now;
        session.wrong += 1;
        session.repeats[q.id] = (session.repeats[q.id] || 0) + 1;
        if (session.repeats[q.id] <= 2) {
          const insertAt = Math.min(session.queue.length, session.index + 6);
          session.queue.splice(insertAt, 0, q.id);
        }
      }
      store.records[q.id] = record;
      saveStore();
      main.querySelectorAll('.option').forEach(function (button) {
        const answer = Number(button.dataset.answer);
        button.disabled = true;
        if (answer === q.answer) button.classList.add('correct');
        if (!correct && answer === selected) button.classList.add('wrong');
      });
      const area = document.getElementById('feedbackArea');
      area.innerHTML = '<div class="feedback ' + (correct ? '' : 'wrong') + '"><strong>' + (correct ? '答對了' : '答錯了') + '</strong>正確答案：' + circled[q.answer - 1] + ' ' + escapeHtml(q.options[q.answer - 1]) + (correct ? '' : '<br>這題會在稍後再次出現。') + '</div><button class="solid-button next-button" id="nextButton" type="button">' + (session.index + 1 >= session.queue.length ? '查看結果' : '下一題') + '</button>';
      document.getElementById('nextButton').addEventListener('click', nextQuestion);
    }
    function nextQuestion() {
      session.index += 1;
      session.answered = false;
      session.selected = null;
      if (session.index >= session.queue.length) renderResult(); else renderQuiz();
    }
    function renderResult() {
      view = 'result';
      setHeader('home');
      const total = session.correct + session.wrong;
      const score = total ? Math.round(session.correct / total * 100) : 0;
      main.innerHTML = '<h1>本次完成</h1><div class="result-score">' + score + '<span style="font-size:22px">%</span></div><p class="subtitle">答錯題目已加入後續複習。</p>' +
        '<div class="result-grid"><div class="stat"><strong>' + session.correct + '</strong><span>答對次數</span></div><div class="stat"><strong>' + session.wrong + '</strong><span>答錯次數</span></div></div>' +
        '<div class="backup-actions"><button class="solid-button" id="againButton">再練一回</button><button class="quiet-button" id="resultHome">返回首頁</button></div>';
      document.getElementById('againButton').addEventListener('click', function () { startSession(session.mode); });
      document.getElementById('resultHome').addEventListener('click', renderHome);
    }
    function renderBrowse() {
      view = 'browse';
      setHeader('home');
      main.innerHTML = '<h1>題庫總覽</h1><div class="toolbar"><label class="sr-only" for="questionSearch">搜尋題目</label><input class="search" id="questionSearch" type="search" placeholder="搜尋題號或關鍵字"><select id="questionFilter"><option value="all">全部</option><option value="wrong">錯題</option><option value="mastered">已熟練</option></select></div><div class="question-list" id="questionList"></div>';
      const search = document.getElementById('questionSearch');
      const filter = document.getElementById('questionFilter');
      function updateList() {
        const term = search.value.trim().toLowerCase();
        const type = filter.value;
        const matches = QUESTIONS.filter(function (q) {
          const r = recordFor(q.id);
          const textMatch = !term || String(q.id) === term || q.question.toLowerCase().includes(term) || q.options.some(function (o) { return o.toLowerCase().includes(term); });
          const filterMatch = type === 'all' || (type === 'wrong' && r.wrong > 0 && r.streak < 2) || (type === 'mastered' && r.level >= 4);
          return textMatch && filterMatch;
        });
        document.getElementById('questionList').innerHTML = matches.length ? matches.map(function (q) {
          const r = recordFor(q.id);
          return '<details class="list-item"><summary><div class="list-meta"><span>第 ' + q.id + ' 題</span><span>作答 ' + r.attempts + ' 次</span><span>答錯 ' + r.wrong + ' 次</span></div>' + escapeHtml(q.question) + '</summary><div class="answer-detail">正確答案：' + circled[q.answer - 1] + ' ' + escapeHtml(q.options[q.answer - 1]) + '</div></details>';
        }).join('') : '<div class="empty">沒有符合的題目</div>';
      }
      search.addEventListener('input', updateList);
      filter.addEventListener('change', updateList);
      updateList();
    }
    function renderBackup() {
      view = 'backup';
      setHeader('home');
      main.innerHTML = '<h1>進度管理</h1><p class="subtitle">進度只儲存在目前這台裝置的瀏覽器。</p><div class="backup-actions"><button class="solid-button" id="exportButton">匯出進度備份</button><button class="quiet-button" id="importButton">匯入進度備份</button><button class="danger-button" id="resetButton">清除全部進度</button></div><div class="note" style="margin-top:18px">更換手機、清除瀏覽器資料或使用無痕模式，紀錄可能消失。可先匯出備份檔保存。</div>';
      document.getElementById('exportButton').addEventListener('click', exportProgress);
      document.getElementById('importButton').addEventListener('click', function () { importFile.click(); });
      document.getElementById('resetButton').addEventListener('click', function () {
        if (confirm('確定要清除所有作答紀錄嗎？')) { store = defaultStore(); saveStore(); renderHome(); }
      });
    }
    function exportProgress() {
      const blob = new Blob([JSON.stringify(store, null, 2)], { type: 'application/json' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = '長照題庫進度備份.json';
      link.click();
      URL.revokeObjectURL(link.href);
    }
    importFile.addEventListener('change', function () {
      const file = importFile.files && importFile.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function () {
        try {
          const parsed = JSON.parse(String(reader.result));
          if (!parsed || parsed.version !== 1 || !parsed.records) throw new Error('invalid');
          store = parsed; saveStore(); alert('進度已還原'); renderHome();
        } catch (_) { alert('這不是有效的進度備份檔'); }
        importFile.value = '';
      };
      reader.readAsText(file);
    });
    homeButton.addEventListener('click', renderHome);
    headerAction.addEventListener('click', function () {
      const action = headerAction.dataset.action;
      if (action === 'browse') renderBrowse(); else if (action === 'backup') renderBackup(); else renderHome();
    });
    renderHome();
  </script>
</body>
</html>
