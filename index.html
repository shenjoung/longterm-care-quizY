<html lang="zh-Hant">
<head>

  <title>長照題庫練習</title>
  <style>
    :root{color-scheme:light;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;--ink:#17312f;--muted:#607371;--line:#d7e3e1;--paper:#fff;--canvas:#f3f7f6;--primary:#147d72;--primary-dark:#0e625a;--primary-soft:#e5f3f1;--accent-soft:#fff0eb;--correct:#18794e;--correct-soft:#e7f6ee;--danger:#b33a35;--danger-soft:#fff0ef;--shadow:0 8px 24px rgba(21,55,51,.08)}*{box-sizing:border-box}html,body{margin:0;min-height:100vh;color:var(--ink);background:var(--canvas)}button,input,select{font:inherit}button{cursor:pointer}.app{width:min(100%,760px);min-height:100vh;margin:0 auto;background:var(--paper);box-shadow:var(--shadow)}header{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;min-height:64px;padding:10px 18px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.96)}.brand{border:0;padding:4px 0;color:var(--ink);background:transparent;font-size:18px;font-weight:800}.header-action{border:1px solid var(--line);border-radius:6px;padding:8px 11px;color:var(--primary-dark);background:#fff;font-weight:700}main{padding:22px 18px calc(40px + env(safe-area-inset-bottom))}h1,h2,p{margin-top:0}h1{margin-bottom:8px;font-size:28px;line-height:1.25}h2{font-size:22px}.subtitle{color:var(--muted);line-height:1.6}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:22px 0}.stat{min-width:0;padding:14px 10px;border:1px solid var(--line);border-radius:8px;background:#fbfdfc;text-align:center}.stat strong{display:block;font-size:24px;color:var(--primary-dark)}.stat span{display:block;margin-top:3px;color:var(--muted);font-size:13px}.section-title{margin:28px 0 12px;font-size:15px;color:var(--muted);font-weight:800}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.action-card{min-height:112px;border:1px solid var(--line);border-radius:8px;padding:16px;background:#fff;color:var(--ink);text-align:left}.action-card.primary{border-color:var(--primary);background:var(--primary);color:#fff}.action-card.review{border-color:#f0b5a6;background:var(--accent-soft)}.action-card.exam{border-color:#11625a;background:#0f6f65;color:#fff}.action-card:disabled{cursor:not-allowed;opacity:.5}.action-card strong{display:block;margin-bottom:7px;font-size:17px}.action-card span{display:block;font-size:13px;line-height:1.45;opacity:.82}.settings-row{display:grid;grid-template-columns:1fr auto;align-items:center;gap:12px;margin-top:12px;padding:14px 0;border-top:1px solid var(--line)}select,.search{width:100%;border:1px solid #b8c9c6;border-radius:6px;padding:11px 12px;background:#fff;color:var(--ink)}.quiet-button,.solid-button,.danger-button{border-radius:6px;padding:11px 15px;font-weight:800}.solid-button{border:1px solid var(--primary);background:var(--primary);color:#fff}.quiet-button{border:1px solid var(--line);background:#fff;color:var(--ink)}.danger-button{border:1px solid #e3a6a2;background:var(--danger-soft);color:var(--danger)}.progress-track{height:6px;margin:5px 0 20px;border-radius:999px;background:#dfe9e7;overflow:hidden}.progress-bar{height:100%;background:var(--primary)}.quiz-meta{display:flex;justify-content:space-between;gap:12px;margin-bottom:9px;color:var(--muted);font-size:14px;font-weight:700}.question-box{padding:20px 0 14px}.question-number{margin-bottom:10px;color:var(--primary-dark);font-size:14px;font-weight:800}.question-text{margin-bottom:20px;font-size:21px;line-height:1.55;font-weight:750}.options{display:grid;gap:10px}.option{display:grid;grid-template-columns:34px 1fr;gap:10px;align-items:start;width:100%;min-height:56px;border:1px solid #b9cac7;border-radius:8px;padding:12px;background:#fff;color:var(--ink);text-align:left;line-height:1.5}.option:disabled{cursor:default;opacity:1}.option.correct{border-color:var(--correct);background:var(--correct-soft);color:#115c3b}.option.wrong{border-color:var(--danger);background:var(--danger-soft);color:#8c2d29}.option.selected{border-color:var(--primary);background:var(--primary-soft)}.option-key{display:grid;width:30px;height:30px;place-items:center;border-radius:50%;background:var(--primary-soft);color:var(--primary-dark);font-weight:900}.option.correct .option-key{background:var(--correct);color:#fff}.option.wrong .option-key{background:var(--danger);color:#fff}.feedback{margin-top:16px;border-left:4px solid var(--correct);padding:13px 14px;background:var(--correct-soft);line-height:1.5}.feedback.wrong{border-color:var(--danger);background:var(--danger-soft)}.feedback strong{display:block;margin-bottom:4px}.next-button{width:100%;margin-top:16px;padding:14px}.result-score{margin:20px 0 4px;font-size:52px;color:var(--primary-dark);font-weight:900}.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:22px 0}.toolbar{display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:14px}.question-list,.history-list,.wrong-list{display:grid;gap:10px}.list-item,.wrong-item{border:1px solid var(--line);border-radius:8px;padding:14px;background:#fff}.list-item summary{cursor:pointer;list-style:none;font-weight:750;line-height:1.45}.list-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:7px;color:var(--muted);font-size:12px}.answer-detail{margin-top:12px;padding-top:12px;border-top:1px solid var(--line);color:var(--correct);line-height:1.5}.answer-detail.danger{color:var(--danger)}.pill{display:inline-flex;align-items:center;border-radius:999px;padding:3px 8px;background:var(--primary-soft);color:var(--primary-dark);font-size:12px;font-weight:900}.pill.danger{background:var(--danger-soft);color:var(--danger)}.pill.pass{background:var(--correct-soft);color:var(--correct)}.empty{padding:36px 18px;border:1px dashed #b8c9c6;border-radius:8px;color:var(--muted);text-align:center}.backup-actions{display:grid;gap:10px}.backup-actions button{width:100%}.note{padding:13px 14px;border:1px solid var(--line);border-radius:8px;background:#f8fbfa;color:var(--muted);font-size:14px;line-height:1.55}.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}@media(max-width:520px){.app{box-shadow:none}main{padding-inline:15px}h1{font-size:25px}.question-text{font-size:19px}.actions{grid-template-columns:1fr}.action-card{min-height:92px}.stat strong{font-size:21px}}
  </style>
</head>
<body>
  <div class="app"><header><button class="brand" id="homeButton" type="button">長照題庫</button><button class="header-action" id="headerAction" type="button">題庫總覽</button></header><main id="appMain"></main></div>
  <input class="sr-only" id="importFile" type="file" accept="application/json">
  <script>
    let QUESTIONS=[];const STORAGE_KEY='care-quiz-progress-v1',circled=['①','②','③','④'],main=document.getElementById('appMain'),homeButton=document.getElementById('homeButton'),headerAction=document.getElementById('headerAction'),importFile=document.getElementById('importFile');let session=null;
    async function loadQuestions(){try{const files=['data/questions-1.txt','data/questions-2.txt','data/questions-3.txt'];const responses=await Promise.all(files.map(file=>fetch(file,{cache:'no-cache'})));if(responses.some(r=>!r.ok))throw new Error('load');const source=(await Promise.all(responses.map(r=>r.text()))).join('\n');QUESTIONS=source.split(/\r?\n/).map(l=>l.trim()).filter(l=>/^\d+\.（[1-4]）/.test(l)).map(line=>{const m=line.match(/^(\d+)\.（([1-4])）([\s\S]+)$/);if(!m)throw new Error('format');const body=m[3],marks=['①','②','③','④'],pos=marks.map(x=>body.indexOf(x));if(pos.some(x=>x<0))throw new Error('options');return{id:Number(m[1]),answer:Number(m[2]),question:body.slice(0,pos[0]).trim(),options:pos.map((p,i)=>body.slice(p+1,i===3?body.length:pos[i+1]).replace(/。$/,'').trim())}});if(QUESTIONS.length!==202||QUESTIONS.some((q,i)=>q.id!==i+1))throw new Error('ids');renderHome()}catch(e){main.innerHTML='<h1>題庫讀取失敗</h1><p class="subtitle">請確認 data/questions-1.txt、data/questions-2.txt、data/questions-3.txt 已經上傳到 GitHub repo。</p>'}}
    function defaultStore(){return{version:1,records:{},exams:[],examCycle:{number:1,index:1,seen:[]},updatedAt:Date.now()}}function loadStore(){try{const p=JSON.parse(localStorage.getItem(STORAGE_KEY));if(!p||p.version!==1||!p.records)return defaultStore();return{...defaultStore(),...p,exams:Array.isArray(p.exams)?p.exams:[],examCycle:p.examCycle&&Array.isArray(p.examCycle.seen)?p.examCycle:{number:1,index:1,seen:[]}}}catch{return defaultStore()}}let store=loadStore();function saveStore(){store.updatedAt=Date.now();localStorage.setItem(STORAGE_KEY,JSON.stringify(store))}function blankRecord(){return{attempts:0,correct:0,wrong:0,streak:0,level:0,nextReview:0,lastAnswered:0,repeatedWrong:0,wrongDates:[]}}function recordFor(id){return{...blankRecord(),...(store.records[id]||{})}}function escapeHtml(v){return String(v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function shuffle(items){const r=items.slice();for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]]}return r}function uniqueCount(){return Object.values(store.records).filter(r=>r.attempts>0).length}function stats(){const rs=Object.values(store.records),now=Date.now();return{practiced:uniqueCount(),wrong:rs.filter(r=>r.wrong>0&&r.streak<2).length,repeatedWrong:rs.filter(r=>r.wrong>=2).length,due:rs.filter(r=>r.attempts>0&&r.nextReview<=now&&r.level<4).length,mastered:rs.filter(r=>r.level>=4).length,exams:store.exams.length,cycleSeen:new Set(store.examCycle.seen).size,cycleIndex:store.examCycle.index}}
    function setHeader(action){headerAction.textContent=action==='home'?'返回首頁':action==='backup'?'進度管理':'題庫總覽';headerAction.dataset.action=action}function renderHome(){setHeader('browse');const s=stats();main.innerHTML='<h1>今天要練哪一組？</h1><p class="subtitle">共 202 題。模擬考固定抽 50 題，5 次考試內會盡量讓全部題目至少出現一次。</p><div class="stats"><div class="stat"><strong>'+s.practiced+'</strong><span>已練題目</span></div><div class="stat"><strong>'+s.cycleSeen+'</strong><span>本輪已考</span></div><div class="stat"><strong>'+s.repeatedWrong+'</strong><span>重複錯題</span></div></div><div class="actions"><button class="action-card exam" data-start="exam"><strong>模擬考試</strong><span>隨機抽 50 題；45 題以上通過</span></button><button class="action-card primary" data-start="quick"><strong>快速測驗</strong><span>隨機抽題，立即看答案</span></button><button class="action-card review" data-start="wrong" '+(s.wrong?'':'disabled')+'><strong>錯題複習</strong><span>'+(s.wrong?s.wrong+' 題需要加強':'目前沒有錯題')+'</span></button><button class="action-card review" data-start="repeated" '+(s.repeatedWrong?'':'disabled')+'><strong>重複錯題</strong><span>'+(s.repeatedWrong?s.repeatedWrong+' 題錯過 2 次以上':'目前沒有重複錯題')+'</span></button><button class="action-card" data-start="due" '+(s.due?'':'disabled')+'><strong>今日複習</strong><span>'+(s.due?s.due+' 題到期':'今天沒有到期題目')+'</span></button><button class="action-card" data-start="all"><strong>順序練習</strong><span>從第 1 題開始依序作答</span></button></div><div class="section-title">測驗設定</div><div class="settings-row"><label for="quizSize">快速測驗題數</label><select id="quizSize"><option value="10">10 題</option><option value="20" selected>20 題</option><option value="50">50 題</option><option value="202">全部 202 題</option></select></div><div class="settings-row"><div><strong>考試紀錄</strong><div class="subtitle" style="font-size:13px;margin-top:3px">目前第 '+s.cycleIndex+' / 5 次，本輪 '+s.cycleSeen+' / 202 題</div></div><button class="quiet-button" data-view="history" '+(s.exams?'':'disabled')+'>查看</button></div><div class="settings-row"><div><strong>學習進度</strong><div class="subtitle" style="font-size:13px;margin-top:3px">備份、還原或清除這台裝置的紀錄</div></div><button class="quiet-button" data-view="backup">管理</button></div>';main.querySelectorAll('[data-start]').forEach(b=>b.addEventListener('click',()=>startSession(b.dataset.start)));const hb=main.querySelector('[data-view="history"]');if(hb)hb.addEventListener('click',renderExamHistory);main.querySelector('[data-view="backup"]').addEventListener('click',renderBackup)}
    function weightedPick(pool,count){const selected=[];let source=pool.slice();while(selected.length<count&&source.length){const weights=source.map(q=>{const r=recordFor(q.id);return 1+(r.attempts===0?6:Math.max(0,4-r.attempts))+(r.wrong*3)+(r.wrong>=2?5:0)-Math.min(r.correct,4)}).map(w=>Math.max(1,w));let total=weights.reduce((a,b)=>a+b,0),roll=Math.random()*total,idx=0;for(;idx<weights.length;idx++){roll-=weights[idx];if(roll<=0)break}selected.push(source[idx]);source.splice(idx,1)}return selected}function buildExamPool(){const cycle=store.examCycle;let seen=new Set(cycle.seen),unseen=QUESTIONS.filter(q=>!seen.has(q.id)),left=6-cycle.index,target=Math.min(50,Math.ceil(unseen.length/left));let picked=shuffle(unseen).slice(0,target);if(picked.length<50){const used=new Set(picked.map(q=>q.id));picked=picked.concat(weightedPick(QUESTIONS.filter(q=>!used.has(q.id)),50-picked.length))}return shuffle(picked).slice(0,50)}function startSession(mode){let pool=QUESTIONS.slice(),title='快速測驗';if(mode==='exam'){pool=buildExamPool();title='模擬考試'}else if(mode==='wrong'){pool=QUESTIONS.filter(q=>{const r=recordFor(q.id);return r.wrong>0&&r.streak<2});title='錯題複習'}else if(mode==='repeated'){pool=QUESTIONS.filter(q=>recordFor(q.id).wrong>=2);title='重複錯題'}else if(mode==='due'){pool=QUESTIONS.filter(q=>{const r=recordFor(q.id);return r.attempts>0&&r.nextReview<=Date.now()&&r.level<4});title='今日複習'}else if(mode==='all'){title='順序練習'}else{pool=weightedPick(pool,Number(document.getElementById('quizSize')?.value||20))}if(!pool.length){renderHome();return}if(mode!=='all')pool=shuffle(pool);session={mode,title,queue:pool.map(q=>q.id),index:0,answered:false,selected:null,correct:0,wrong:0,repeats:{},answers:{},examSaved:false};renderQuiz()}function currentQuestion(){return QUESTIONS.find(q=>q.id===session.queue[session.index])}
    function renderQuiz(){setHeader('home');const q=currentQuestion(),progress=Math.min(100,session.index/session.queue.length*100),examLabel=session.mode==='exam'?'<span class="pill">交卷後顯示答案</span>':'';main.innerHTML='<div class="quiz-meta"><span>'+escapeHtml(session.title)+'</span><span>'+(session.index+1)+' / '+session.queue.length+'</span></div><div class="progress-track"><div class="progress-bar" style="width:'+progress+'%"></div></div><section class="question-box"><div class="question-number">題目 '+q.id+' '+examLabel+'</div><div class="question-text">'+escapeHtml(q.question)+'</div><div class="options">'+q.options.map((o,i)=>'<button class="option" type="button" data-answer="'+(i+1)+'"><span class="option-key">'+circled[i]+'</span><span>'+escapeHtml(o)+'</span></button>').join('')+'</div><div id="feedbackArea"></div></section>';main.querySelectorAll('.option').forEach(b=>b.addEventListener('click',()=>answerQuestion(Number(b.dataset.answer))))}function applyAnswerToRecord(q,correct){const p=recordFor(q.id),now=Date.now(),r={...p,attempts:p.attempts+1,lastAnswered:now};if(correct){r.correct++;r.streak++;r.level=Math.min(4,Math.max(1,p.level+1));r.nextReview=now+[0,1,3,7,14][r.level]*86400000}else{r.wrong++;r.streak=0;r.level=0;r.nextReview=now;r.wrongDates=(p.wrongDates||[]).concat(now).slice(-20);r.repeatedWrong=Math.max(p.repeatedWrong||0,r.wrong-1)}store.records[q.id]=r;saveStore();return r}function answerQuestion(selected){if(session.answered)return;session.answered=true;session.selected=selected;const q=currentQuestion(),correct=selected===q.answer;applyAnswerToRecord(q,correct);session.answers[q.id]={selected,correct,answer:q.answer};if(correct)session.correct++;else session.wrong++;if(session.mode==='exam'){main.querySelectorAll('.option').forEach(b=>{b.disabled=true;if(Number(b.dataset.answer)===selected)b.classList.add('selected')});document.getElementById('feedbackArea').innerHTML='<div class="feedback"><strong>已作答</strong>模擬考完成後會一起顯示答案與錯題。</div><button class="solid-button next-button" id="nextButton" type="button">'+(session.index+1>=session.queue.length?'交卷並查看結果':'下一題')+'</button>';document.getElementById('nextButton').addEventListener('click',nextQuestion);return}if(!correct){session.repeats[q.id]=(session.repeats[q.id]||0)+1;if(session.repeats[q.id]<=2)session.queue.splice(Math.min(session.queue.length,session.index+6),0,q.id)}main.querySelectorAll('.option').forEach(b=>{const a=Number(b.dataset.answer);b.disabled=true;if(a===q.answer)b.classList.add('correct');if(!correct&&a===selected)b.classList.add('wrong')});document.getElementById('feedbackArea').innerHTML='<div class="feedback '+(correct?'':'wrong')+'"><strong>'+(correct?'答對了':'答錯了')+'</strong>正確答案：'+circled[q.answer-1]+' '+escapeHtml(q.options[q.answer-1])+(correct?'':'<br>這題會在稍後再次出現。')+'</div><button class="solid-button next-button" id="nextButton" type="button">'+(session.index+1>=session.queue.length?'查看結果':'下一題')+'</button>';document.getElementById('nextButton').addEventListener('click',nextQuestion)}function nextQuestion(){session.index++;session.answered=false;session.selected=null;if(session.index>=session.queue.length)renderResult();else renderQuiz()}
    function saveExamResult(passed){const now=Date.now(),answers=session.queue.map(id=>{const a=session.answers[id];return{id,selected:a?.selected||null,answer:a?.answer||null,correct:Boolean(a?.correct)}}),wrongIds=answers.filter(x=>!x.correct).map(x=>x.id),repeatIds=wrongIds.filter(id=>recordFor(id).wrong>=2);store.exams=[{id:now,date:now,total:50,correct:session.correct,wrong:session.wrong,passed,questionIds:session.queue.slice(),wrongQuestionIds:wrongIds,repeatedWrongQuestionIds:repeatIds,answers}].concat(store.exams||[]).slice(0,100);const seen=new Set(store.examCycle.seen);session.queue.forEach(id=>seen.add(id));let nextIndex=store.examCycle.index+1,number=store.examCycle.number;if(nextIndex>5||seen.size>=QUESTIONS.length){nextIndex=1;number++;store.examCycle={number,index:nextIndex,seen:[]}}else store.examCycle={number,index:nextIndex,seen:[...seen]};session.examSaved=true;saveStore()}function renderWrongSummary(){const ids=Object.keys(session.answers).map(Number).filter(id=>!session.answers[id].correct);if(!ids.length)return'<div class="feedback"><strong>沒有錯題</strong>這次 50 題全部答對。</div>';return'<h2>本次錯題</h2><div class="wrong-list">'+ids.map(id=>{const q=QUESTIONS.find(x=>x.id===id),a=session.answers[id],rep=recordFor(id).wrong>=2?'<span class="pill danger">重複錯</span> ':'';return'<div class="wrong-item"><strong>第 '+id+' 題 '+rep+'</strong><div>'+escapeHtml(q.question)+'</div><div class="answer-detail danger">你的答案：'+circled[a.selected-1]+' '+escapeHtml(q.options[a.selected-1])+'</div><div class="answer-detail">正確答案：'+circled[q.answer-1]+' '+escapeHtml(q.options[q.answer-1])+'</div></div>'}).join('')+'</div>'}function renderResult(){setHeader('home');const exam=session.mode==='exam',passed=session.correct>=45;if(exam&&!session.examSaved)saveExamResult(passed);main.innerHTML='<h1>'+(exam?(passed?'模擬考通過':'模擬考未通過'):'本次完成')+'</h1><div class="result-score">'+(exam?session.correct+'<span style="font-size:22px"> / 50</span>':Math.round(session.correct/(session.correct+session.wrong)*100)+'<span style="font-size:22px">%</span>')+'</div><p class="subtitle">'+(exam?'通過標準：50 題中至少答對 45 題。錯題已加入複習紀錄。':'答錯題目已加入後續複習。')+'</p><div class="result-grid"><div class="stat"><strong>'+session.correct+'</strong><span>答對次數</span></div><div class="stat"><strong>'+session.wrong+'</strong><span>答錯次數</span></div></div>'+(exam?renderWrongSummary():'')+'<div class="backup-actions"><button class="solid-button" id="againButton">'+(exam?'再考一次':'再練一回')+'</button>'+(exam?'<button class="quiet-button" id="historyButton">查看考試紀錄</button>':'')+'<button class="quiet-button" id="resultHome">返回首頁</button></div>';document.getElementById('againButton').addEventListener('click',()=>startSession(session.mode));const hb=document.getElementById('historyButton');if(hb)hb.addEventListener('click',renderExamHistory);document.getElementById('resultHome').addEventListener('click',renderHome)}
    function renderBrowse(){setHeader('home');main.innerHTML='<h1>題庫總覽</h1><div class="toolbar"><input class="search" id="questionSearch" type="search" placeholder="搜尋題號或關鍵字"><select id="questionFilter"><option value="all">全部</option><option value="wrong">錯題</option><option value="repeated">重複錯題</option><option value="mastered">已熟練</option></select></div><div class="question-list" id="questionList"></div>';const search=document.getElementById('questionSearch'),filter=document.getElementById('questionFilter');function update(){const term=search.value.trim().toLowerCase(),type=filter.value,matches=QUESTIONS.filter(q=>{const r=recordFor(q.id),tm=!term||String(q.id)===term||q.question.toLowerCase().includes(term)||q.options.some(o=>o.toLowerCase().includes(term)),fm=type==='all'||type==='wrong'&&r.wrong>0&&r.streak<2||type==='repeated'&&r.wrong>=2||type==='mastered'&&r.level>=4;return tm&&fm});document.getElementById('questionList').innerHTML=matches.length?matches.map(q=>{const r=recordFor(q.id);return'<details class="list-item"><summary><div class="list-meta"><span>第 '+q.id+' 題</span><span>作答 '+r.attempts+' 次</span><span>答錯 '+r.wrong+' 次</span>'+(r.wrong>=2?'<span class="pill danger">重複錯</span>':'')+'</div>'+escapeHtml(q.question)+'</summary><div class="answer-detail">正確答案：'+circled[q.answer-1]+' '+escapeHtml(q.options[q.answer-1])+'</div></details>'}).join(''):'<div class="empty">沒有符合的題目</div>'}search.addEventListener('input',update);filter.addEventListener('change',update);update()}function formatDate(t){return new Date(t).toLocaleString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}function renderExamHistory(){setHeader('home');const exams=store.exams||[];main.innerHTML='<h1>考試紀錄</h1><p class="subtitle">只會保存這台裝置完成過的模擬考。通過標準是 50 題答對 45 題。</p>'+(exams.length?'<div class="history-list">'+exams.map((exam,i)=>'<details class="list-item" '+(i===0?'open':'')+'><summary><div class="list-meta"><span>'+formatDate(exam.date)+'</span><span class="pill '+(exam.passed?'pass':'danger')+'">'+(exam.passed?'通過':'未通過')+'</span></div>答對 '+exam.correct+' / 50，答錯 '+exam.wrong+' 題</summary>'+(exam.wrongQuestionIds&&exam.wrongQuestionIds.length?'<div class="wrong-list">'+exam.wrongQuestionIds.map(id=>{const q=QUESTIONS.find(x=>x.id===id),a=(exam.answers||[]).find(x=>x.id===id)||{};if(!q)return'';return'<div class="wrong-item"><strong>第 '+id+' 題 '+((exam.repeatedWrongQuestionIds||[]).includes(id)?'<span class="pill danger">重複錯</span> ':'')+'</strong><div>'+escapeHtml(q.question)+'</div><div class="answer-detail danger">當時答案：'+(a.selected?circled[a.selected-1]+' '+escapeHtml(q.options[a.selected-1]):'未作答')+'</div><div class="answer-detail">正確答案：'+circled[q.answer-1]+' '+escapeHtml(q.options[q.answer-1])+'</div></div>'}).join('')+'</div>':'<div class="answer-detail">這次沒有錯題。</div>')+'</details>').join('')+'</div>':'<div class="empty">還沒有考試紀錄</div>')}
    function renderBackup(){setHeader('home');main.innerHTML='<h1>進度管理</h1><p class="subtitle">進度只儲存在目前這台裝置的瀏覽器。</p><div class="backup-actions"><button class="solid-button" id="exportButton">匯出進度備份</button><button class="quiet-button" id="importButton">匯入進度備份</button><button class="danger-button" id="resetButton">清除全部進度</button></div><div class="note" style="margin-top:18px">更換手機、清除瀏覽器資料或使用無痕模式，紀錄可能消失。可先匯出備份檔保存。</div>';document.getElementById('exportButton').addEventListener('click',()=>{const blob=new Blob([JSON.stringify(store,null,2)],{type:'application/json'}),link=document.createElement('a');link.href=URL.createObjectURL(blob);link.download='長照題庫進度備份.json';link.click();URL.revokeObjectURL(link.href)});document.getElementById('importButton').addEventListener('click',()=>importFile.click());document.getElementById('resetButton').addEventListener('click',()=>{if(confirm('確定要清除所有作答紀錄嗎？')){store=defaultStore();saveStore();renderHome()}})}importFile.addEventListener('change',()=>{const file=importFile.files&&importFile.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const p=JSON.parse(String(reader.result));if(!p||p.version!==1||!p.records)throw new Error('invalid');store={...defaultStore(),...p,exams:Array.isArray(p.exams)?p.exams:[]};saveStore();alert('進度已還原');renderHome()}catch{alert('這不是有效的進度備份檔')}importFile.value=''};reader.readAsText(file)});homeButton.addEventListener('click',renderHome);headerAction.addEventListener('click',()=>{const a=headerAction.dataset.action;if(a==='browse')renderBrowse();else if(a==='backup')renderBackup();else renderHome()});loadQuestions();
  </script>
